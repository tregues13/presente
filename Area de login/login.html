<!DOCTYPE html>
<html>
    <head>

        <meta charset="UTF-8">
        <meta name="viwerport" content="device-width,user-scalable=0">
        <link rel="stylesheet" href="assets/css/login.css"/>

    </head>
    <body>
        <div class="form-login">
            
            <form method="get">
                <fieldset>
                    <div id="central">
                        <legend>LOGIN</legend>

                        <img src="assets/images/usuario.png">

                        <div class="alinhamento">

                            <label>
                                <div class="descreption">Email:</div>
                                <input type="text" name="Email" placeholder="Email@gmail.com" required autofocus>
                            </label>

                            <label>
                                <div class="descreption">Senha:</div>
                                <input type="text" name="password" placeholder="Digite sua senha" required>
                            </label>
                            <button id="Enviar">Logar</button>
                        </div>
                        <div id="geral-line">
                            <div class="line"></div>
                            <div id="texto">Ou</div>
                            <div class="line"></div>
                        </div>
                        <a href="">
                            <div class="logar-google">
                                <img src="assets/images/google.png">
                                <p>Continuar com o Google</p>

                            </div>
                        </a>

                        <div class="diretrizes">
                            <input type="checkbox" id="diretrizes">
                            <label for="diretrizes">
                                Eu aceito os termos de uso de <a>Dados.</a>
                            </label>
                        </div>
                    </div>
                </fieldset>
            </form>

        </div>
        
    </body>
</html>
