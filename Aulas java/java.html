<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO TIME NO DIE</title>

    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/jogo.css">
</head>
<body>

    <!-- MENU -->

    <div class="menu">

        <div class="menu-box">

            <h1>NO TIME NO DIE</h1>

            <p>
                O Fim Esta proximo
            </p>

            <button class="start">
                INICIAR AVENTURA
            </button>

        </div>

    </div>

    <!--GAME AREA-->

    <div class="game-area">

        <!-- ENIMY INFORMATION-->

        <div class="enemy-panel">

            <div class="enemy-header">

                <h2>CAÇADOR DE RECOMPENSAS</h2>

            </div>

            <div class="enemyhealth">
                30
            </div>

        </div>

        <!--LOG -->

        <div class="log-panel">

            <div class="panel-title">
                TERMINAL DE COMBATE
            </div>

            <div id="log">

                Conexão estabelecida...
                <br>
                Sistema de combate carregado...
                <br>
                Aguardando hostil...

            </div>
        </div>

        <!--PLAYER FUNCTIONS-->

        <div class="player-panel">

            <div class="division1">

                <div class="status">

                    <div class="status-card">
                        VIDA
                        <span class="item1">20</span>
                    </div>

                    <div class="status-card">
                        DEFESA
                        <span class="item2">3</span>
                    </div>

                    <div class="status-card">
                        PA
                        <span class="item3">0</span>
                    </div>

                    <div class="status-card">
                        MUNIÇÃO
                        <span class="item4">6</span>
                    </div>

                </div>

            </div>

            <div class="division2">

                <div id="menu-batlle">
                    <button class="action x1">SHOP</button>
                    <button class="action x2">CONTINUAR</button>
                    <button class="action x3">TRATAR FERIDAS</button>
                </div>

                <div class="buttons">

                    <button class="action n1">
                        PISTOLA
                    </button>

                    <button class="action n2">
                        ESCOPETA
                    </button>

                    <button class="action n3">
                        FACA TÁTICA
                    </button>

                    <button class="action n4">
                        RECARREGAR
                    </button>

                </div>

            </div>

        </div>
    </div>
    <div class="SHOP">

    </div>

    <script src="assets/javascript/sistema.js"></script>

</body>
</html>
